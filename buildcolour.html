<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>老王CPM工具箱 - 彩色名称生成器</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: url("https://i.postimg.cc/XYj6dDzv/IMG-0133.jpg") no-repeat center center fixed;
        background-size: cover;
        margin: 0;
        padding: 0;
        color: white;
        min-height: 100vh;
    }

    .center-wrapper {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }

    .container {
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.25);
        padding: 30px 25px;
        border-radius: 14px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.40);
        width: 320px;
        text-align: center;
    }

    h1 {
        margin: 0 0 20px 0;
        font-size: 1.8rem;
        letter-spacing: 1px;
    }

    .label {
        display: block;
        margin: 12px 0 6px;
        font-size: 0.95rem;
        opacity: 0.9;
        text-align: left;
    }

    input[type="text"],
    input[type="color"] {
        width: 100%;
        padding: 12px;
        margin: 6px 0 14px;
        border-radius: 6px;
        border: none;
        background: rgba(255,255,255,0.12);
        color: #fff;
        font-size: 1rem;
        text-align: center;
        box-sizing: border-box;
        outline: none;
    }

    input[type="color"] {
        height: 44px;
        padding: 4px;
        background: rgba(255,255,255,0.08);
        cursor: pointer;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
    }
    input[type="color"]::-webkit-color-swatch {
        border: none;
        border-radius: 4px;
    }

    .preview {
        margin: 20px 0 16px;
        font-family: Consolas, monospace;
        font-size: 1.35rem;
        min-height: 1.8em;
        word-break: break-all;
        text-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    button {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 6px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.16);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.35);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
        color: #ffffff;
        font-weight: bold;
        font-size: 1rem;
        transition: all 0.25s;
    }

    button:hover {
        background: rgba(255, 255, 255, 0.28);
        transform: translateY(-1px);
    }

    button:active {
        transform: translateY(0);
    }

    #copyToast {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,180,0,0.85);
        color: white;
        padding: 10px 24px;
        border-radius: 30px;
        font-size: 0.9rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s;
        z-index: 100;
    }

    .status {
        margin-top: 12px;
        color: #0f8;
        font-size: 0.9rem;
        min-height: 1.3em;
        word-wrap: break-word;
    }

    .error {
        color: #ff5555;
    }

    footer {
        margin-top: 20px;
        font-size: 0.8rem;
        opacity: 0.7;
    }
</style>
</head>
<body>

<div class="center-wrapper">
  <div class="container">
      <h1>👑彩色昵称生成器👑</h1>

      <div class="label">输入想要的昵称</div>
      <input type="text" id="nameIn" placeholder="例如：player" value="">

      <div class="label">选择颜色</div>
      <input type="color" id="colorIn" value="#00d2ff">

      <div class="label">预览结果（点击下方按钮复制到剪切板）</div>
      <div id="resultPreview" class="preview">[00d2ff]Cyber_Executive</div>

      <button onclick="copyResult()">📋 复制到剪切板</button>
      <button style="background:rgba(255,165,0,0.18)" onclick="window.location.href='changeemail.html'">← 返回工具箱</button>

      <div id="status" class="status"></div>
      <footer>© CPM老王版权所有　WX: dm8889dm</footer>
  </div>
</div>

<div id="copyToast">已复制到剪切板</div>

<script>
const nameIn     = document.getElementById('nameIn');
const colorIn    = document.getElementById('colorIn');
const preview    = document.getElementById('resultPreview');
const statusDiv  = document.getElementById('status');
const toast      = document.getElementById('copyToast');

function updatePreview() {
    let name = nameIn.value.trim() || "Player";
    let hex = colorIn.value.substring(1).toLowerCase();
    
    let code = `[${hex}]${name}`;
    preview.textContent = code;
    preview.style.color = `#${hex}`;
}

function copyResult() {
    const text = preview.textContent;
    if (!text || text.length < 3) {
        showStatus("内容太短，无法复制", true);
        return;
    }

    navigator.clipboard.writeText(text).then(() => {
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 1800);
        showStatus("复制成功！");
    }).catch(() => {
        showStatus("复制失败，请手动长按复制", true);
    });
}

function showStatus(msg, isError = false) {
    statusDiv.textContent = msg;
    statusDiv.className = isError ? 'status error' : 'status';
    setTimeout(() => statusDiv.textContent = '', 2800);
}

nameIn.addEventListener('input', updatePreview);
colorIn.addEventListener('input', updatePreview);

updatePreview();
</script>
</body>
</html>
